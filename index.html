<!DOCTYPE html>
<html>
<head>
    <title>QuickLoan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: Arial; color: white; overflow: hidden; }
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                        url('bg.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }
        .center {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        h1 { margin-bottom: 30px; }
        .btn {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        .green { background: #22c55e; }
        .blue { background: #3b82f6; }
    </style>
</head>
<body>
<div class="center">
    <h1>Prabhat Loan Services 💰</h1>
    <button class="btn green" onclick="goApply()">Apply For Loan</button>
    <button class="btn blue" onclick="goContact()">Contact Us</button>
</div>
<script>
function goApply(){ window.location.href = "apply.html"; }
function goContact(){ window.location.href = "contact.html"; }
</script>
</body>
</html>
