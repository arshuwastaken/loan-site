<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            background: url('bg.png');
            background-size: cover;
            background-position: center;
        }

        /* DARK OVERLAY */
        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
            left: 0;
            z-index: -2;
        }

        /* SNOW CANVAS */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .center {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* BUTTON CONTAINER */
        .btn-box {
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            position: absolute;
            bottom: 80px;
        }

        /* TRANSPARENT BUTTONS */
        .btn {
            padding: 14px 30px;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            background: transparent;
            color: white;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: scale(0.95);
        }

    </style>
</head>

<body>

<!-- SNOW -->
<canvas id="snow"></canvas>

<div class="center">
    <h1>၊|Star Choice Finserv🌐</h1>
</div>

<!-- LEFT RIGHT BUTTONS -->
<div class="btn-box">
    <button class="btn" onclick="goApply()">Apply For Loan</button>
    <button class="btn" onclick="goContact()">Contact Us</button>
</div>

<script>
function goApply(){ window.location.href = "apply.html"; }
function goContact(){ window.location.href = "contact.html"; }

// SNOW EFFECT
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let snowflakes = [];

for(let i=0;i<100;i++){
    snowflakes.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*3+1,
        d: Math.random()*1
    });
}

function drawSnow(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();

    for(let i=0;i<snowflakes.length;i++){
        let f = snowflakes[i];
        ctx.moveTo(f.x,f.y);
        ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);
    }

    ctx.fill();
    moveSnow();
}

function moveSnow(){
    for(let i=0;i<snowflakes.length;i++){
        let f = snowflakes[i];
        f.y += f.d;
        if(f.y > canvas.height){
            f.y = 0;
            f.x = Math.random()*canvas.width;
        }
    }
}

setInterval(drawSnow, 25);
</script>

</body>
</html>
