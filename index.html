<!DOCTYPE html>
<html>
<head>
    <title>QuickLoan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;

            /* BACKGROUND IMAGE */
            background: url('bg.png');
            background-size: cover;
            background-position: center;
        }

        /* DARK OVERLAY (pro look) */
        body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            top: 0;
            left: 0;
            z-index: -1;
        }

        .center {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* BUTTONS */
        .btn {
            padding: 14px 30px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
            width: 220px;
        }

        .green {
            background: linear-gradient(45deg, #22c55e, #16a34a);
        }

        .blue {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .btn:active {
            transform: scale(0.95);
        }

    </style>
</head>

<body>

<div class="center">
    <h1>Prabhat Loan Services 💰</h1>

    <button class="btn green" onclick="goApply()">Apply For Loan</button>
    <button class="btn blue" onclick="goContact()">Contact Us</button>
</div>

<script>
function goApply(){ window.location.href = "apply.html"; }
function goContact(){ window.location.href = "contact.html"; }
</script>

</body>
</html>
