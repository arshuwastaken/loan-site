<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>

    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; background: url('bg.png') center/cover no-repeat; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: background 0.5s; }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 100; }
        
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); overflow-x: hidden; transition: 0.5s; padding-top: 80px; z-index: 50; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; transition: 0.3s; }
        .sidebar a:hover { color: #22c55e; padding-left: 35px; }

        #dynamicModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 15px; text-align: center; border: 1px solid rgba(255,255,255,0.2); width: 350px; }
        .modal-content input { width: 85%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; background: #0f172a; color: white; }
        .modal-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: 600; margin: 5px; }

        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 8px; color: white; font-weight: 600; display: none; z-index: 2000; }
        .content-container { text-align: center; }
        .logo { width: 250px; height: auto; margin-bottom: 25px; cursor: pointer; }
        .btn-box { display: flex; gap: 20px; justify-content: center; padding: 20px; min-height: 50px; }
        .btn { padding: 14px 26px; border: 2px solid white; border-radius: 10px; cursor: pointer; background: transparent; color: white; transition: 0.3s; backdrop-filter: blur(5px); user-select: none; }
        
        /* Admin Mode Styling */
        .admin-edit-active .btn { resize: both; overflow: auto; border: 2px dashed #f1c40f !important; }
        #publishBtn { display: none; position: fixed; bottom: 30px; right: 30px; padding: 15px 30px; background: #22c55e; border: none; border-radius: 30px; color: white; font-weight: bold; cursor: pointer; z-index: 1000; }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>
<button id="publishBtn" onclick="publishChanges()">💾 Publish All Changes</button>

<div id="dynamicModal">
    <div class="modal-content">
        <h3 id="modalTitle">Settings</h3>
        <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this)">
        <input type="text" id="modalInput1" placeholder="Or Paste URL">
        <input type="text" id="modalInput2" placeholder="Link URL" style="display:none;">
        <br>
        <button class="modal-btn" onclick="submitModal()" style="background:#22c55e;">Confirm</button>
        <button class="modal-btn" onclick="closeModal()" style="background:#ef4444;">Cancel</button>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">&#9776;</div>
<div id="mySidebar" class="sidebar">
    <a href="#" id="grantBtn" onclick="openModal('admin')">Grant Admin</a>
    <div id="adminMenu" style="display:none;">
        <a href="#" onclick="toggleDrag()" style="color: #f1c40f;">🖱️ Edit Mode (Drag/Resize)</a>
        <a href="#" onclick="openModal('logo')" style="color: #3498db;">🖼️ Change Logo</a>
        <a href="#" onclick="openModal('bg')" style="color: #f1c40f;">🎨 Change BG</a>
        <a href="#" onclick="openModal('btn')" style="color: #ffffff;">➕ Add Button</a>
        <a href="#" onclick="signOutAdmin()" style="color: #ff4757;">🚪 Sign Out</a>
    </div>
</div>

<div class="content-container">
    <img src="logo.png" alt="Star Choice Logo" class="logo" id="mainLogo">
    <h1>Star Choice Finserv🌐</h1>
    <div class="btn-box" id="btnContainer">
        <button class="btn" onclick="goApply()">💰 Apply For Loan</button>
        <button class="btn" onclick="goContact()">📞 Contact Us</button>
    </div>
</div>

<script>
    const ADMIN_CODE = "201413";
    let currentMode = '';
    let sortable = new Sortable(document.getElementById('btnContainer'), { animation: 150, disabled: true });

    function handleFile(input) {
        const reader = new FileReader();
        reader.onload = (e) => document.getElementById('modalInput1').value = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }

    function openModal(mode) {
        currentMode = mode;
        document.getElementById('dynamicModal').style.display = "flex";
        document.getElementById('modalInput2').style.display = (mode === 'btn') ? "block" : "none";
        document.getElementById('modalTitle').innerText = mode.toUpperCase();
    }

    function closeModal() { document.getElementById('dynamicModal').style.display = "none"; }

    function submitModal() {
        let v1 = document.getElementById('modalInput1').value;
        let v2 = document.getElementById('modalInput2').value;

        if(currentMode === 'admin' && v1 === ADMIN_CODE) { localStorage.setItem("isAdmin", "true"); showAdminFeatures(); closeModal(); }
        else if(currentMode === 'logo') { document.getElementById('mainLogo').src = v1; }
        else if(currentMode === 'bg') { document.body.style.background = `url('${v1}') center/cover no-repeat`; }
        else if(currentMode === 'btn') { 
            let b = document.createElement('button'); b.className = 'btn'; b.innerText = v1; b.onclick = () => window.location.href = v2;
            document.getElementById('btnContainer').appendChild(b);
        }
        closeModal();
    }

    function toggleDrag() {
        sortable.option("disabled", !sortable.option("disabled"));
        document.getElementById('btnContainer').classList.toggle('admin-edit-active');
        document.getElementById('publishBtn').style.display = sortable.option("disabled") ? "none" : "block";
        showMsg("Admin Edit Mode " + (sortable.option("disabled") ? "OFF" : "ON"), "#f1c40f");
    }

    function publishChanges() {
        localStorage.setItem("savedLogo", document.getElementById('mainLogo').src);
        localStorage.setItem("savedBg", document.body.style.background);
        localStorage.setItem("savedLayout", document.getElementById('btnContainer').innerHTML);
        showMsg("Changes Published Successfully!", "#22c55e");
    }

    function showAdminFeatures() { document.getElementById("adminMenu").style.display = "block"; document.getElementById("grantBtn").style.display = "none"; }
    function signOutAdmin() { localStorage.removeItem("isAdmin"); location.reload(); }
    function showMsg(t, c) { var m = document.getElementById('messageBox'); m.innerText = t; m.style.backgroundColor = c; m.style.display = 'block'; setTimeout(() => m.style.display = 'none', 3000); }

    window.onload = function() {
        if (localStorage.getItem("isAdmin") === "true") showAdminFeatures();
        if (localStorage.getItem("savedLogo")) document.getElementById('mainLogo').src = localStorage.getItem("savedLogo");
        if (localStorage.getItem("savedBg")) document.body.style.background = localStorage.getItem("savedBg");
        if (localStorage.getItem("savedLayout")) document.getElementById('btnContainer').innerHTML = localStorage.getItem("savedLayout");
    };

    function toggleNav() { var s = document.getElementById("mySidebar"); s.style.width = s.style.width === "250px" ? "0" : "250px"; }
</script>
</body>
</html>
