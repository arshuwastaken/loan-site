<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            color: white;
            overflow: hidden;
            background: url('bg.png') center/cover no-repeat;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: -2;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .content-container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Logo ka size yahan bada kiya gaya hai */
        .logo {
            width: 250px; 
            height: auto;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .btn-box {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 14px 26px;
            border: 2px solid white;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            background: transparent;
            color: white;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .btn:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 600px) {
            h1 { font-size: 24px; }
            .btn { padding: 10px 16px; font-size: 13px; }
            .logo { width: 180px; } /* Mobile ke liye thoda adjust kiya */
        }
    </style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="content-container">
    <img src="logo.png" alt="Star Choice Logo" class="logo">
    
    <h1>Star Choice Finserv🌐</h1>
    
    <div class="btn-box">
        <button class="btn" onclick="goApply()">💰 Apply For Loan</button>
        <button class="btn" onclick="goContact()">📞 Contact Us</button>
    </div>
</div>

<script>
    function goApply(){ window.location.href = "apply.html"; }
    function goContact(){ window.location.href = "contact.html"; }

    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");

    function resize(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener("resize", resize);

    let snowflakes = [];
    for(let i=0;i<120;i++){
        snowflakes.push({
            x: Math.random()*canvas.width,
            y: Math.random()*canvas.height,
            r: Math.random()*3+1,
            d: Math.random()*1.5
        });
    }

    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let f of snowflakes){
            ctx.moveTo(f.x,f.y);
            ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);
        }
        ctx.fill();
        moveSnow();
    }

    function moveSnow(){
        for(let f of snowflakes){
            f.y += f.d;
            if(f.y > canvas.height){
                f.y = 0;
                f.x = Math.random()*canvas.width;
            }
        }
    }
    setInterval(drawSnow, 25);
</script>

</body>
</html>
