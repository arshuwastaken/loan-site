<!DOCTYPE html>
<html>
<head>
    <title>WiserX Stuff</title>

    <style>
        body {
            margin: 0;
            background: black;
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .top-line {
            height: 4px;
            width: 40%;
            background: cyan;
            margin: auto;
            margin-top: 20px;
        }

        h1 {
            margin-top: 20px;
        }

        .bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(180deg);
            opacity: 0.25;
            z-index: -1;
        }

        .btn {
            display: block;
            width: 220px;
            margin: 20px auto;
            padding: 15px;
            background: black;
            border: 2px solid lime;
            color: lime;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: lime;
            color: black;
        }

    </style>
</head>

<body>

    <img src="background.jpg" class="bg">

    <div class="top-line"></div>

    <h1>WiserX Stuff 🚀</h1>

    <button class="btn">MC Stuff</button>
    <button class="btn">DC Stuff</button>
    <button class="btn">Data Storer</button>

</body>
</html>
