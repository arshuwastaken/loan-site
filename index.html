<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; background: url('bg.png') center/cover no-repeat; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 100; }

        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); overflow-x: hidden; transition: 0.5s; padding-top: 80px; z-index: 50; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; }
        .sidebar a:hover { color: #22c55e; padding-left: 35px; }

        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 15px; text-align: center; width: 300px; }
        .modal-content input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }

        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 8px; display: none; }

        .btn { padding: 14px 26px; border: 2px solid white; border-radius: 10px; background: transparent; color: white; cursor: pointer; }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>

<!-- LOGIN MODAL -->
<div id="adminModal">
    <div class="modal-content">
        <h3>Admin Login</h3>
        <input type="email" id="adminEmail" placeholder="Email">
        <input type="password" id="adminPass" placeholder="Password">
        <br>
        <button onclick="firebaseLogin()">Login</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">☰</div>

<div id="mySidebar" class="sidebar">
    <a href="#">Terms</a>
    <a href="#" id="grantBtn" onclick="openModal()">Admin Login</a>

    <div id="adminMenu" style="display:none;">
        <a href="#" onclick="viewApplications()">📋 View Applications</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
</div>

<h1>Star Choice Finserv🌐</h1>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
  authDomain: "star-choice-finserv.firebaseapp.com",
  projectId: "star-choice-finserv",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// LOGIN
window.firebaseLogin = function () {
    const email = document.getElementById("adminEmail").value;
    const pass = document.getElementById("adminPass").value;

    signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
        localStorage.setItem("isAdmin", "true");
        showAdmin();
        msg("Login Success", "green");
        closeModal();
    })
    .catch(() => msg("Wrong login", "red"));
};

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
    if (user) showAdmin();
});

// LOGOUT
window.logout = function(){
    signOut(auth);
    localStorage.removeItem("isAdmin");
    document.getElementById("adminMenu").style.display="none";
    document.getElementById("grantBtn").style.display="block";
};

// UI
function showAdmin(){
    document.getElementById("adminMenu").style.display="block";
    document.getElementById("grantBtn").style.display="none";
}

window.openModal = ()=> document.getElementById("adminModal").style.display="flex";
window.closeModal = ()=> document.getElementById("adminModal").style.display="none";

function msg(t,c){
    let m=document.getElementById("messageBox");
    m.innerText=t; m.style.background=c; m.style.display="block";
    setTimeout(()=>m.style.display="none",2000);
}
</script>

</body>
</html>
