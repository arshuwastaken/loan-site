<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; background: url('bg.png') center/cover no-repeat; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; }

        .sidebar { height: 100%; width: 0; position: fixed; left: 0; top: 0; background: rgba(0,0,0,0.85); transition: 0.5s; padding-top: 80px; }
        .sidebar a { padding: 15px 25px; display: block; color: white; text-decoration: none; }
        .sidebar a:hover { color: #22c55e; }

        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 15px; text-align: center; }
        input { padding: 10px; margin: 10px; width: 80%; }

        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px; display: none; }

        .btn { padding: 12px 20px; border: 2px solid white; background: transparent; color: white; cursor: pointer; }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>

<!-- LOGIN MODAL -->
<div id="adminModal">
    <div class="modal-content">
        <h3>Admin Login</h3>
        <input type="email" id="adminEmail" placeholder="Enter Email">
        <br>
        <button onclick="checkLogin()">Login</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">☰</div>

<div id="mySidebar" class="sidebar">
    <a href="#">Terms</a>
    <a href="#">Loans</a>
    <hr>
    <a href="#" id="grantBtn" onclick="openModal()">Admin Login</a>

    <div id="adminMenu" style="display:none;">
        <a href="#" onclick="viewApplications()">📋 View Applications</a>
        <a href="#" onclick="logout()">🚪 Logout</a>
    </div>
</div>

<h1>Star Choice Finserv🌐</h1>
<button class="btn" onclick="goApply()">Apply Loan</button>

<!-- ✅ FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
  authDomain: "star-choice-finserv.firebaseapp.com",
  projectId: "star-choice-finserv",
};

const app = initializeApp(firebaseConfig);
</script>

<script>
const ADMIN_EMAIL = "arshshuklabpl@gmail.com";

window.onload = function() {
    if(localStorage.getItem("isAdmin") === "true") showAdmin();
}

function toggleNav(){
    let s = document.getElementById("mySidebar");
    s.style.width = s.style.width === "250px" ? "0" : "250px";
}

function openModal(){ document.getElementById("adminModal").style.display="flex"; }
function closeModal(){ document.getElementById("adminModal").style.display="none"; }

function checkLogin(){
    let email = document.getElementById("adminEmail").value;

    if(email === ADMIN_EMAIL){
        localStorage.setItem("isAdmin","true");
        showAdmin();
        showMsg("Login Success","green");
        closeModal();
    } else {
        showMsg("Wrong Email","red");
    }
}

function showAdmin(){
    document.getElementById("adminMenu").style.display="block";
    document.getElementById("grantBtn").style.display="none";
}

function logout(){
    localStorage.removeItem("isAdmin");
    location.reload();
}

function showMsg(text,color){
    let box = document.getElementById("messageBox");
    box.innerText=text;
    box.style.background=color;
    box.style.display="block";
    setTimeout(()=>box.style.display="none",2000);
}

function viewApplications(){
    window.open("https://docs.google.com","");
}

function goApply(){ window.location.href="apply.html"; }
</script>

</body>
</html>
