<!DOCTYPE html>
<html>
<head>
    <title>QuickLoan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }
        .header {
            padding: 20px;
            background: #020617;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }
        .hero {
            text-align: center;
            padding: 50px 20px;
        }
        .hero h1 {
            font-size: 40px;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border-radius: 5px;
            border: none;
        }
        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="header">QuickLoan 💰</div>

<div class="hero">
    <h1>Instant Loan Assistance</h1>
    <p>Fast • Simple • Secure</p>
</div>

<div class="box">
    <h2>Apply Now</h2>
    <input type="text" placeholder="Full Name">
    <input type="number" placeholder="Loan Amount">
    <input type="text" placeholder="Mobile Number">
    <button onclick="apply()">Submit</button>
</div>

<div class="footer">
    *We are not a lender. We only provide loan assistance.
</div>

<script>
function apply(){
    alert("Application submitted!");
}
</script>

</body>
</html>
