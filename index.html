<!DOCTYPE html>
<html>
<head>
    <title>QuickLoan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            color: white;
            overflow-x: hidden;
        }

        /* Background layer */
        body::before {
            content: "";
            position: fixed;
            width: 110%;
            height: 110%;
            top: -5%;
            left: -5%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url('bg.jpg');
            background-size: cover;
            background-position: centere;
            transform: rotate(-3deg);
            z-index: -1;
        }

        .header {
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .hero h1 {
            font-size: 38px;
        }

        .box {
            background: rgba(30,41,59,0.8);
            padding: 25px;
            margin: 20px auto;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 8px;
            border-radius: 6px;
            border: none;
        }

        button {
            padding: 12px 25px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #ccc;
        }
    </style>
</head>

<body>

<div class="header">Prabhat Loan Services 💰</div>

<div class="hero">
    <h1>Apply For Car Lone</h1>
    <p>Fast Approval • Trusted Help • Simple Process</p>
</div>

<div class="box">
    <h2>Apply Now</h2>
    <input type="text" placeholder="Full Name">
    <input type="number" placeholder="Loan Amount">
    <input type="text" placeholder="Mobile Number">
    <button onclick="apply()">Submit</button>
</div>

<div class="footer">
    *We are not a lender. We only provide loan assistance.
</div>

<script>
function apply(){
    alert("Application submitted! We will contact you soon.");
}
</script>

</body>
</html>
