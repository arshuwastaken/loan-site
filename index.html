<!DOCTYPE html>
<html>
<head>
    <title>Star Choice - Secure Login 🚀</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Smooth Fade-in Animation */
        html { opacity: 0; animation: fadeInPage 1s ease-in forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; 
            background: url('bg.png') center/cover no-repeat; height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            transition: background 0.5s ease-in-out;
        }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: -1; }
        canvas { position: fixed; inset: 0; z-index: -1; }

        .login-card {
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 25px; border: 1px solid rgba(34, 197, 94, 0.4);
            width: 360px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: translateY(0); transition: 0.3s;
        }
        .login-card:hover { border-color: #22c55e; box-shadow: 0 0 30px rgba(34, 197, 94, 0.2); }

        h2 { margin-bottom: 30px; font-weight: 600; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { font-size: 13px; color: #94a3b8; margin-left: 5px; text-transform: uppercase; }
        input {
            width: 100%; padding: 14px; margin-top: 8px; border-radius: 12px;
            border: 1px solid #334155; background: #0f172a; color: white; outline: none;
            box-sizing: border-box; transition: 0.3s; font-family: 'Poppins';
        }
        input:focus { border-color: #22c55e; background: #1e293b; }

        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.7), rgba(20, 83, 45, 0.9));
            color: white !important; font-weight: 600; cursor: pointer; transition: 0.4s;
            display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 15px;
            font-size: 16px;
        }
        .btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4); }

        .toggle-text { margin-top: 25px; font-size: 14px; color: #cbd5e1; }
        .toggle-text span { color: #22c55e; cursor: pointer; font-weight: 600; text-decoration: underline; }

        #customAlert { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 9999; justify-content: center; align-items: center; 
        }
        .alert-box { 
            background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; 
            border: 1px solid #22c55e; width: 320px; animation: popUp 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popUp { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div id="customAlert">
    <div class="alert-box">
        <h3 id="alertTitle" style="margin-top:0;">Notification</h3>
        <p id="alertMsg"></p>
        <button class="btn" onclick="closeAlert()" style="margin-top: 10px; padding: 10px;">Got it! 🚀</button>
    </div>
</div>

<div class="login-card">
    <h2 id="formTitle">Login Access 🚀</h2>
    
    <div class="input-group">
        <label>Gmail Address</label>
        <input type="email" id="email" placeholder="aapka-naam@gmail.com">
    </div>
    
    <div class="input-group">
        <label>Secret Password</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn" id="mainBtn">🚀 Authenticate</button>

    <p class="toggle-text" id="togglePara">
        New User? <span onclick="toggleForm()">Create your ID</span>
    </p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { 
        getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, onAuthStateChanged 
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
        if (user && user.emailVerified) {
            window.location.href = "home.html";
        }
    });

    onValue(ref(db, 'settings/backgroundUrl'), (snapshot) => {
        const url = snapshot.val();
        if(url) document.body.style.backgroundImage = `url('${url}')`;
    });

    let isLoginMode = true;

    window.toggleForm = function() {
        isLoginMode = !isLoginMode;
        document.getElementById('formTitle').innerText = isLoginMode ? "Login Access 🚀" : "Create Account 🚀";
        document.getElementById('mainBtn').innerText = isLoginMode ? "🚀 Authenticate" : "🚀 Register Me";
        document.getElementById('togglePara').innerHTML = isLoginMode ? 
            'New User? <span onclick="toggleForm()">Create your ID</span>' : 
            'Have an ID? <span onclick="toggleForm()">Login instead</span>';
    }

    document.getElementById('mainBtn').onclick = async () => {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        if(!email || !password) {
            showAlert("Missing Info", "Bhai, Email aur Password toh dalo!", "#ef4444");
            return;
        }

        try {
            if(isLoginMode) {
                // LOGIN
                const userCred = await signInWithEmailAndPassword(auth, email, password);
                if(userCred.user.emailVerified) {
                    showAlert("Success", "Welcome to Star Choice! 🚀", "#22c55e");
                    setTimeout(() => window.location.href = "home.html", 2000);
                } else {
                    showAlert("Verify Gmail", "Bhai pehle apni Gmail check karo aur link verify karo! 📧", "#f1c40f");
                }
            } else {
                // SIGNUP (Database Save Logic Added Here)
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCred.user;

                // [NEW] Save user email to Realtime Database
                await set(ref(db, 'users/' + user.uid), {
                    email: email,
                    uid: user.uid,
                    registeredAt: new Date().toISOString()
                });

                await sendEmailVerification(user);
                showAlert("Check Gmail", "Registration done! Apni Gmail pe jaake link click karo verification ke liye. 📧", "#22c55e");
                toggleForm();
            }
        } catch (error) {
            showAlert("Error", error.message, "#ef4444");
        }
    };

    window.showAlert = (title, msg, color) => {
        document.getElementById("alertTitle").innerText = title;
        document.getElementById("alertTitle").style.color = color;
        document.getElementById("alertMsg").innerText = msg;
        document.getElementById("customAlert").style.display = "flex";
    };
    window.closeAlert = () => { document.getElementById("customAlert").style.display = "none"; };
</script>

<script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let snowflakes = [];
    for(let i=0;i<100;i++){ snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.6)";
        ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        for(let f of snowflakes){ f.y += f.d; if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; } }
    }
    setInterval(drawSnow, 30);
</script>
</body>
</html>
