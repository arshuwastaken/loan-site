<!DOCTYPE html>
<html lang="en">
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { 
            margin: 0; font-family: 'Poppins', sans-serif; color: white; overflow: hidden; 
            background: url('bg.png') center/cover no-repeat fixed; height: 100vh; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }

        /* Sidebar & Menu */
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 100; }
        .sidebar { height: 100%; width: 0; position: fixed; top: 0; left: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); overflow-x: hidden; transition: 0.5s; padding-top: 80px; z-index: 150; border-right: 1px solid rgba(255,255,255,0.1); }
        .sidebar a { padding: 15px 25px; text-decoration: none; font-size: 18px; color: white; display: block; transition: 0.3s; white-space: nowrap; }
        .sidebar a:hover { color: #22c55e; padding-left: 35px; }

        /* Main Container - Responsive Center */
        .content-container { 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; width: 90%; max-width: 600px; z-index: 5;
        }
        .logo { width: 180px; max-width: 50%; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
        h1 { font-size: clamp(22px, 5vw, 32px); font-weight: 600; margin: 0 0 40px 0; }

        /* Buttons Container */
        .button-group { 
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; width: 100%;
            position: relative; min-height: 150px; 
        }

        .btn { 
            padding: 12px 24px; border: 2px solid white; border-radius: 10px; 
            cursor: pointer; background: rgba(255,255,255,0.05); color: white; 
            backdrop-filter: blur(5px); transition: 0.3s; font-size: 16px;
            text-decoration: none; display: inline-block; user-select: none;
        }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
        
        /* Admin Drag Mode */
        .admin-active { 
            position: absolute !important; /* Only absolute when dragging */
            border: 2px dashed #f1c40f !important; 
            cursor: move !important; 
            box-shadow: 0 0 15px #f1c40f; 
        }

        #publishBtn { 
            display: none; position: fixed; bottom: 25px; right: 25px; 
            background: #22c55e; color: white; padding: 15px 30px; 
            border-radius: 50px; border: none; font-weight: 600; 
            cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* Modal & Msg */
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 15px; text-align: center; width: 90%; max-width: 320px; }
        .modal-content input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }
        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 25px; border-radius: 8px; color: white; display: none; z-index: 3000; }

        @media (max-width: 600px) {
            .button-group { flex-direction: column; align-items: center; }
            .btn { width: 100%; max-width: 250px; }
        }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>
<button id="publishBtn">💾 Save Layout</button>

<div id="adminModal">
    <div class="modal-content">
        <h3>Admin Access</h3>
        <input type="password" id="adminInput" placeholder="Enter Secure Code">
        <button class="btn" id="submitAdminBtn" style="background:#22c55e; border:none; margin-bottom:10px; width:100%">Verify</button>
        <button class="btn" onclick="document.getElementById('adminModal').style.display='none'" style="background:#ef4444; border:none; width:100%">Cancel</button>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">&#9776;</div>

<div id="mySidebar" class="sidebar">
    <a href="#">Terms and Policy</a>
    <a href="#">Applied Loans</a>
    <a href="#">Previous Loan History</a>
    <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:10px 20px;">
    <a href="#" id="grantBtn" onclick="document.getElementById('adminModal').style.display='flex'">Grant Admin</a>
    <div id="adminMenu" style="display:none;">
        <a href="#" onclick="viewApplications()" style="color: #22c55e;">📋 View Applications</a>
        <a href="#" id="editToggleLink" style="color: #f1c40f;">🖱️ Edit Layout</a>
        <a href="#" onclick="signOutAdmin()" style="color: #ff4757;">🚪 Sign Out</a>
    </div>
</div>

<div class="content-container">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Star Choice Finserv🌐</h1>
    
    <div class="button-group" id="btnGroup">
        <button class="btn draggable" id="btnApply">💰 Apply For Loan</button>
        <button class="btn draggable" id="btnContact">📞 Contact Us</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    let isEditMode = false;

    // --- Admin Logic ---
    window.checkAdmin = async function() {
        const inputCode = document.getElementById("adminInput").value.trim();
        const snapshot = await get(ref(db, 'admin/code'));
        if (snapshot.exists() && String(snapshot.val()) === inputCode) {
            localStorage.setItem("isAdmin", "true");
            location.reload();
        } else {
            showMsg("Invalid Code!", "#ef4444");
        }
    }
    document.getElementById('submitAdminBtn').onclick = checkAdmin;

    // --- Sync Layout ---
    onValue(ref(db, 'layout/positions'), (snapshot) => {
        const data = snapshot.val();
        if (data && !isEditMode) {
            Object.keys(data).forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.style.position = "absolute";
                    el.style.top = data[id].top;
                    el.style.left = data[id].left;
                }
            });
        }
    });

    // --- Responsive Dragging ---
    const draggables = document.querySelectorAll('.draggable');
    draggables.forEach(btn => {
        let isDragging = false;
        
        btn.addEventListener('mousedown', e => {
            if (!isEditMode) return;
            isDragging = true;
            btn.style.zIndex = 1000;
        });

        document.addEventListener('mousemove', e => {
            if (!isDragging || !isEditMode) return;
            btn.style.position = 'absolute';
            btn.style.left = (e.clientX - btn.offsetWidth / 2) + 'px';
            btn.style.top = (e.clientY - btn.offsetHeight / 2) + 'px';
        });

        document.addEventListener('mouseup', () => { isDragging = false; });

        btn.onclick = () => {
            if (isEditMode) return;
            window.location.href = btn.id === 'btnApply' ? "apply.html" : "contact.html";
        };
    });

    document.getElementById('publishBtn').onclick = function() {
        const positions = {};
        draggables.forEach(btn => {
            positions[btn.id] = { top: btn.style.top, left: btn.style.left };
        });
        set(ref(db, 'layout/positions'), positions).then(() => {
            showMsg("Layout Published!", "#22c55e");
            toggleEditMode();
        });
    };

    window.toggleEditMode = function() {
        isEditMode = !isEditMode;
        draggables.forEach(btn => {
            btn.classList.toggle('admin-active');
            if(!isEditMode) btn.style.zIndex = 10;
        });
        document.getElementById('publishBtn').style.display = isEditMode ? 'block' : 'none';
        document.getElementById('editToggleLink').innerText = isEditMode ? "🛑 Stop Editing" : "🖱️ Edit Layout";
    };
    document.getElementById('editToggleLink').onclick = toggleEditMode;

    if (localStorage.getItem("isAdmin") === "true") {
        document.getElementById("adminMenu").style.display = "block";
        document.getElementById("grantBtn").style.display = "none";
    }
</script>

<script>
    function toggleNav() {
        const s = document.getElementById("mySidebar");
        s.style.width = s.style.width === "250px" ? "0" : "250px";
    }
    function signOutAdmin() { localStorage.removeItem("isAdmin"); location.reload(); }
    function showMsg(t, c) {
        const m = document.getElementById('messageBox');
        m.innerText = t; m.style.backgroundColor = c; m.style.display = 'block';
        setTimeout(() => m.style.display = 'none', 3000);
    }
    function viewApplications() { window.open("https://docs.google.com/spreadsheets/d/1UZs2_kd8iF0lBXaaSiRDJNoPlelvCgqbFSGyxw2E8nU/edit", "_blank"); }

    // Snow
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    let snowflakes = [];
    for(let i=0;i<80;i++){ snowflakes.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, r: Math.random()*3+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white"; ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); f.y += f.d; if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; } }
        ctx.fill(); requestAnimationFrame(drawSnow);
    }
    drawSnow();
</script>
</body>
</html>
