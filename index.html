<!DOCTYPE html>
<html>
<head>
    <title>QuickLoan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
        }
        .header {
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: bold;
        }
        .hero {
            text-align: center;
            padding: 40px 20px;
        }
        .hero h1 {
            font-size: 38px;
        }
        .box {
            background: #1e293b;
            padding: 25px;
            margin: 20px auto;
            width: 320px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 8px;
            border-radius: 6px;
            border: none;
        }
        button {
            padding: 12px 25px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #16a34a;
        }
        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="header">QuickLoan 💰</div>

<div class="hero">
    <h1>Get Loan Assistance Easily</h1>
    <p>Fast Approval • Trusted Help • Simple Process</p>
</div>

<div class="box">
    <h2>Apply Now</h2>
    <input type="text" placeholder="Full Name">
    <input type="number" placeholder="Loan Amount">
    <input type="text" placeholder="Mobile Number">
    <button onclick="apply()">Submit</button>
</div>

<div class="footer">
    *We are not a lender. We only provide loan assistance.
</div>

<script>
function apply(){
    alert("Application submitted! We will contact you soon.");
}
</script>

</body>
</html>
