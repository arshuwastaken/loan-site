<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            color: white; 
            overflow: hidden; 
            background: url('bg.png') center/cover no-repeat; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.5s ease-in-out;
        }
        /* Page Load Animation */
        html { opacity: 0; animation: fadeIn 0.8s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        
        /* Smooth Sidebar */
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 100; transition: 0.3s; }
        .menu-icon:hover { color: #22c55e; transform: scale(1.1); }
        
        .sidebar { 
            height: 100%; 
            width: 0; 
            position: fixed; 
            top: 0; 
            left: 0; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px); 
            overflow-x: hidden; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding-top: 80px; 
            z-index: 50; 
            border-right: 1px solid rgba(34, 197, 94, 0.3); 
        }
        .sidebar a { 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 17px; 
            color: white !important; 
            display: block; 
            transition: 0.3s; 
            white-space: nowrap; 
            opacity: 0;
        }
        .sidebar.open a { opacity: 1; }
        .sidebar a:hover { background: rgba(34, 197, 94, 0.1); color: #22c55e !important; padding-left: 35px; }

        /* Admin Modal */
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #22c55e; width: 320px; }
        .modal-content input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; text-align: center; }
        .modal-btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin: 5px; color: white !important; }

        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 10px; color: white; font-weight: 600; display: none; z-index: 2000; }

        /* Content Container */
        .content-container { text-align: center; z-index: 5; }
        .logo { width: 180px; height: auto; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .logo:hover { transform: scale(1.05); }
        h1 { font-size: 32px; font-weight: 600; margin-bottom: 40px; }
        
        .btn-box { display: flex; gap: 20px; justify-content: center; }
        .btn { 
            padding: 16px 30px; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 14px; 
            cursor: pointer; 
            background: rgba(255,255,255,0.05); 
            color: white !important; 
            transition: 0.4s; 
            backdrop-filter: blur(10px); 
            font-size: 16px; 
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { 
            border-color: #22c55e; 
            background: rgba(34, 197, 94, 0.2); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .btn-box { flex-direction: column; align-items: center; }
            .btn { width: 260px; justify-content: center; }
        }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>

<!-- Admin Modal -->
<div id="adminModal">
    <div class="modal-content">
        <h3 style="margin:0;">🚀 Admin Access</h3>
        <p style="font-size: 12px; color: #94a3b8;">Enter code if not auto-promoted</p>
        <input type="password" id="adminInput" placeholder="Security Code">
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="modal-btn" id="submitAdminBtn" style="background:#22c55e;">Verify 🚀</button>
            <button class="modal-btn" onclick="document.getElementById('adminModal').style.display='none'" style="background:#ef4444;">Cancel</button>
        </div>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">&#9776;</div>

<div id="mySidebar" class="sidebar">
    <a href="#" onclick="window.location.reload()">🏠 Refresh Home</a>
    <a href="#">📑 My Loans</a>
    <a href="#">🕒 History</a>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 20px;">
    
    <!-- Dynamic Admin Section -->
    <a href="#" id="grantBtn" onclick="document.getElementById('adminModal').style.display='flex'">🔑 Grant Admin</a>
    <div id="adminMenu" style="display:none;">
        <a href="admin.html" style="color: #22c55e !important;">🚀 Admin Panel</a>
        <a href="#" onclick="signOutAdmin()" style="color: #ff4757 !important;">🚪 Exit Admin Mode</a>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 20px;">
    <a href="#" id="logoutUser" style="color: #ef4444 !important;">👋 Log Out Account</a>
</div>

<div class="content-container">
    <img src="logo.png" alt="Star Choice Logo" class="logo" onclick="window.location.reload()">
    <h1>Star Choice Finserv 🌐</h1>
    <div class="btn-box">
        <button class="btn" id="goApply">🚀 Apply For Loan</button>
        <button class="btn" id="goContact">🚀 Contact Us</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // [SECURITY & ROLE CHECK]
    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
        } else {
            // Check real-time if user is admin in Database
            const userRoleRef = ref(db, 'users/' + user.uid + '/role');
            onValue(userRoleRef, (snapshot) => {
                if (snapshot.exists() && snapshot.val() === 'admin') {
                    localStorage.setItem("isAdmin", "true");
                    showAdminFeatures();
                } else {
                    // If not admin in DB, check if they have manual override
                    if (localStorage.getItem("isAdmin") !== "true") {
                        hideAdminFeatures();
                    }
                }
            });
        }
    });

    // Manual Admin Access (Backup)
    window.checkAdmin = async function() {
        const inputCode = document.getElementById("adminInput").value.trim();
        const snapshot = await get(ref(db, 'admin/code'));
        if (snapshot.exists() && String(snapshot.val()) === inputCode) {
            localStorage.setItem("isAdmin", "true");
            showAdminFeatures();
            showMsg("Admin Access Granted!", "#22c55e");
            document.getElementById("adminModal").style.display = "none";
        } else {
            showMsg("Wrong Code!", "#ef4444");
        }
    };

    // Logout
    document.getElementById('logoutUser').onclick = () => {
        signOut(auth).then(() => {
            localStorage.removeItem("isAdmin");
            window.location.href = "index.html";
        });
    };

    // Sync Background
    const bgRef = ref(db, 'settings/backgroundUrl');
    onValue(bgRef, (snapshot) => {
        const url = snapshot.val();
        if(url) document.body.style.backgroundImage = `url('${url}')`;
    });

    document.getElementById('submitAdminBtn').onclick = checkAdmin;
    document.getElementById('goApply').onclick = () => window.location.href = "apply.html";
    document.getElementById('goContact').onclick = () => window.location.href = "contact.html";
</script>

<script>
    function toggleNav() {
        var sidebar = document.getElementById("mySidebar");
        if (sidebar.style.width === "250px") {
            sidebar.style.width = "0";
            sidebar.classList.remove("open");
        } else {
            sidebar.style.width = "250px";
            sidebar.classList.add("open");
        }
    }

    function showAdminFeatures() {
        document.getElementById("adminMenu").style.display = "block";
        document.getElementById("grantBtn").style.display = "none";
    }

    function hideAdminFeatures() {
        document.getElementById("adminMenu").style.display = "none";
        document.getElementById("grantBtn").style.display = "block";
    }

    window.signOutAdmin = function() {
        localStorage.removeItem("isAdmin");
        hideAdminFeatures();
        showMsg("Admin Mode Off", "#ff4757");
    }

    function showMsg(text, color) {
        var msgBox = document.getElementById('messageBox');
        msgBox.innerText = text;
        msgBox.style.backgroundColor = color;
        msgBox.style.display = 'block';
        setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
    }

    // Snow Effect
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let snowflakes = [];
    for(let i=0;i<100;i++){ snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        for(let f of snowflakes){ f.y += f.d; if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; } }
    }
    setInterval(drawSnow, 30);
</script>
</body>
</html>
