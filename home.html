<!DOCTYPE html>
<html>
<head>
    <title>Star Choice Finserv</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            font-family: 'Poppins', sans-serif; 
            color: white; 
            overflow: hidden; 
            background: url('bg.png') center/cover no-repeat; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            transition: background 0.5s ease-in-out;
        }
        body::after { content: ""; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -2; }
        canvas { position: fixed; inset: 0; z-index: -1; }
        
        /* Smooth Sidebar Logic */
        .menu-icon { position: absolute; top: 20px; left: 20px; font-size: 30px; cursor: pointer; z-index: 100; transition: 0.3s; }
        .menu-icon:hover { color: #22c55e; }
        
        .sidebar { 
            height: 100%; 
            width: 0; 
            position: fixed; 
            top: 0; 
            left: 0; 
            background: rgba(15, 23, 42, 0.9); 
            backdrop-filter: blur(20px); 
            overflow-x: hidden; 
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            padding-top: 80px; 
            z-index: 50; 
            border-right: 1px solid rgba(34, 197, 94, 0.3); 
        }
        .sidebar a { 
            padding: 15px 25px; 
            text-decoration: none; 
            font-size: 17px; 
            color: white !important; 
            display: block; 
            transition: 0.3s; 
            white-space: nowrap; /* Prevents text jumping */
            opacity: 0;
        }
        .sidebar.open a { opacity: 1; }
        .sidebar a:hover { background: rgba(34, 197, 94, 0.1); color: #22c55e !important; padding-left: 35px; }

        /* Professional Modal */
        #adminModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #22c55e; width: 320px; box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); }
        .modal-content input { width: 90%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; text-align: center; }
        
        .modal-btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; margin: 5px; color: white !important; transition: 0.3s; }

        /* Message Box */
        #messageBox { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 12px; color: white; font-weight: 600; display: none; z-index: 2000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-bottom: 3px solid rgba(255,255,255,0.3); }

        /* Main Content */
        .content-container { text-align: center; z-index: 5; }
        .logo { width: 220px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.2)); }
        h1 { font-size: 36px; font-weight: 600; margin-bottom: 40px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        /* Rocket Greenish Buttons */
        .btn-box { display: flex; gap: 20px; justify-content: center; }
        .btn { 
            padding: 16px 30px; 
            border: 1px solid rgba(255,255,255,0.3); 
            border-radius: 12px; 
            cursor: pointer; 
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(34, 197, 94, 0.15) 100%); 
            color: white !important; 
            transition: 0.4s; 
            backdrop-filter: blur(10px); 
            font-size: 16px; 
            font-weight: 600;
            font-family: 'Poppins', sans-serif; 
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: inset 0 0 15px rgba(255,255,255,0.05);
        }
        .btn:hover { 
            border-color: #22c55e; 
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.2) 0%, rgba(34, 197, 94, 0.4) 100%); 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }

        @media (max-width: 600px) {
            .btn-box { flex-direction: column; gap: 15px; align-items: center; }
            .btn { width: 240px; justify-content: center; }
        }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>

<!-- Admin Modal -->
<div id="adminModal">
    <div class="modal-content">
        <h3 style="margin:0;">🚀 Admin Access</h3>
        <input type="password" id="adminInput" placeholder="Security Code">
        <div style="display: flex; justify-content: center; gap: 10px;">
            <button class="modal-btn" id="submitAdminBtn" style="background:#22c55e;">Verify 🚀</button>
            <button class="modal-btn" onclick="document.getElementById('adminModal').style.display='none'" style="background:#ef4444;">Cancel</button>
        </div>
    </div>
</div>

<div class="menu-icon" onclick="toggleNav()">&#9776;</div>

<div id="mySidebar" class="sidebar">
    <a href="#">📜 Terms and Policy</a>
    <a href="#">📑 Applied Loans</a>
    <a href="#">🕒 Loan History</a>
    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 20px;">
    
    <a href="#" id="grantBtn" onclick="document.getElementById('adminModal').style.display='flex'">🔑 Grant Admin</a>
    <div id="adminMenu" style="display:none;">
        <a href="admin.html" style="color: #22c55e !important; font-weight: 600;">🚀 Open Panel</a>
        <a href="#" onclick="signOutAdmin()" style="color: #ff4757 !important;">🚪 Sign Out</a>
    </div>
</div>

<div class="content-container">
    <img src="logo.png" alt="Star Choice Logo" class="logo">
    <h1>Star Choice Finserv 🌐</h1>
    <div class="btn-box">
        <button class="btn" id="goApply">🚀 Apply For Loan</button>
        <button class="btn" id="goContact">🚀 Contact Us</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const bgRef = ref(db, 'settings/backgroundUrl');
    onValue(bgRef, (snapshot) => {
        const url = snapshot.val();
        document.body.style.backgroundImage = url ? `url('${url}')` : "url('bg.png')";
    });

    window.checkAdmin = async function() {
        const inputCode = document.getElementById("adminInput").value.trim();
        try {
            const snapshot = await get(ref(db, 'admin/code'));
            if (snapshot.exists() && String(snapshot.val()) === inputCode) {
                localStorage.setItem("isAdmin", "true");
                showAdminFeatures();
                showMsg("Access Granted 🚀", "#22c55e");
                document.getElementById("adminModal").style.display = "none";
            } else {
                showMsg("Invalid Security Code!", "#ef4444");
            }
        } catch (error) {
            showMsg("Connection Error!", "#ef4444");
        }
    };
    document.getElementById('submitAdminBtn').onclick = checkAdmin;

    document.getElementById('goApply').onclick = () => window.location.href = "apply.html";
    document.getElementById('goContact').onclick = () => window.location.href = "contact.html";

    if (localStorage.getItem("isAdmin") === "true") {
        showAdminFeatures();
    }
</script>

<script>
    function toggleNav() {
        var sidebar = document.getElementById("mySidebar");
        if (sidebar.style.width === "250px") {
            sidebar.style.width = "0";
            sidebar.classList.remove("open");
        } else {
            sidebar.style.width = "250px";
            sidebar.classList.add("open");
        }
    }

    function showAdminFeatures() {
        const menu = document.getElementById("adminMenu");
        const btn = document.getElementById("grantBtn");
        if(menu) menu.style.display = "block";
        if(btn) btn.style.display = "none";
    }

    window.signOutAdmin = function() {
        localStorage.removeItem("isAdmin");
        document.getElementById("adminMenu").style.display = "none";
        document.getElementById("grantBtn").style.display = "block";
        showMsg("Admin Logged Out 🚪", "#ff4757");
    }

    function showMsg(text, color) {
        var msgBox = document.getElementById('messageBox');
        msgBox.innerText = text;
        msgBox.style.backgroundColor = color;
        msgBox.style.display = 'block';
        setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
    }

    // Snow Effect
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    let snowflakes = [];
    for(let i=0;i<120;i++){ snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2.5+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
        ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        for(let f of snowflakes){
            f.y += f.d;
            if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; }
        }
    }
    setInterval(drawSnow, 30);
</script>
</body>
</html>
