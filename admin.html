<!DOCTYPE html>
<html>
<head>
    <title>Star Choice - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html { opacity: 0; animation: fadeInPage 0.8s ease-in forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        
        body::before { 
            content: ""; position: fixed; inset: 0; 
            background: url('bg.png') center/cover no-repeat; 
            z-index: -2; opacity: 0.4; transition: background 0.5s ease-in-out; 
        }
        
        canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; position: relative; z-index: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(30, 41, 59, 0.7); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: rgba(30, 41, 59, 0.8); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; backdrop-filter: blur(5px); }
        .stat-box h4 { margin: 0; font-size: 11px; color: #94a3b8; text-transform: uppercase; }
        .stat-box p { margin: 5px 0 0; font-size: 20px; font-weight: 600; color: #22c55e; }

        .settings-card { background: rgba(30, 41, 59, 0.9); padding: 25px; border-radius: 15px; margin-bottom: 25px; border: 1px solid #22c55e; }
        .input-group { display: flex; gap: 10px; margin-top: 15px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-family: 'Poppins'; }

        #authLockOverlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); z-index: 20000; display: flex; justify-content: center; align-items: center; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: #1e293b; padding: 30px; border-radius: 20px; text-align: center; border: 1px solid #22c55e; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; }

        .btn-main { background: #22c55e; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; justify-content: center; font-family: 'Poppins'; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }

        .app-card { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        
        .tab-btn-box { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: #94a3b8; cursor: pointer; font-family: 'Poppins'; font-weight: 600; }
        .tab-btn.active { color: #22c55e; border-bottom: 2px solid #22c55e; }
        
        .user-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .dots-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 18px; padding: 5px 10px; }
        
        /* Fixed Dropdown Position */
        .dropdown { 
            position: absolute; right: 40px; top: 10px; 
            background: #0f172a; border: 1px solid #22c55e; 
            border-radius: 8px; display: none; z-index: 11000; 
            min-width: 150px; box-shadow: 0 10px 25px rgba(0,0,0,0.7); 
        }
        .dropdown button { width: 100%; padding: 12px; background: none; border: none; color: white; text-align: left; cursor: pointer; font-size: 13px; font-family: 'Poppins'; }
        .dropdown button:hover { background: #1e293b; color: #22c55e; }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<div id="authLockOverlay">
    <div class="modal-box" style="max-width: 350px;">
        <h2>Admin Access</h2>
        <input type="email" id="loginEmail" placeholder="Admin Gmail">
        <input type="password" id="loginPass" placeholder="Password" style="margin-top:10px;">
        <button id="loginSubmitBtn" class="btn-main" style="width:100%; margin-top:20px;">Verify & Unlock</button>
        <p id="loginError" style="color:#ef4444; font-size:12px; margin-top:10px;"></p>
    </div>
</div>

<div id="userModal" class="modal-overlay">
    <div class="modal-box">
        <h3>📧 User Management</h3>
        <div class="tab-btn-box">
            <button class="tab-btn active" id="tabAdmin" onclick="switchTab('admin')">Admins</button>
            <button class="tab-btn" id="tabUser" onclick="switchTab('user')">Users</button>
        </div>
        <div id="emailList" style="min-height: 200px; text-align: left;"></div>
        <button class="btn-main" onclick="document.getElementById('userModal').style.display='none'" style="margin-top: 20px; width: 100%; background: #ef4444;">Close</button>
    </div>
</div>

<div class="container">
    <div id="adminContent" style="display: none;">
        <div class="header">
            <h2 style="margin:0;">Admin Control Center 🔐</h2>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Sign Out</button>
        </div>

        <div class="stats-row">
            <div class="stat-box"><h4>Applications</h4><p id="statApps">0</p></div>
            <div class="stat-box"><h4>System Status</h4><p id="statMaintenance">Live</p></div>
            <div class="stat-box"><h4>Total Users</h4><p id="statUsers">0</p></div>
        </div>

        <div class="settings-card">
            <h3>Website Appearance 🖼️</h3>
            <div class="input-group">
                <input type="text" id="bgUrlInput" placeholder="Paste image link here">
                <button class="btn-main" onclick="updateBackground()">Update Theme</button>
            </div>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <button class="btn-main" style="flex:1;" onclick="loadApplications()">🔍 Sync Records</button>
            <button class="btn-main" style="flex:1;" onclick="openUserManager()">📧 Manage Users</button>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 25px;">
            <button class="btn-main" style="flex:1; background: #3b82f6;" onclick="exportData()">📊 Export JSON</button>
            <button class="btn-main" id="maintToggleBtn" style="flex:1; background: #8b5cf6;" onclick="toggleMaintenance()">⚙️ Enable Maintenance</button>
        </div>

        <div id="applicationsList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
    import { getDatabase, ref, onValue, set, get, update, remove } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const SUPER_ADMIN = "arshshuklabpl@gmail.com";

    window.logout = () => { localStorage.removeItem("isAdmin"); signOut(auth); window.location.href = "index.html"; };
    
    window.toggleMaintenance = async () => {
        const snap = await get(ref(db, 'settings/maintenance'));
        await set(ref(db, 'settings/maintenance'), !(snap.val() || false));
    };

    window.updateBackground = () => {
        const url = document.getElementById("bgUrlInput").value.trim();
        if(url) set(ref(db, 'settings/backgroundUrl'), url);
    };

    window.loadApplications = () => {
        onValue(ref(db, 'applications'), (snap) => {
            const listDiv = document.getElementById("applicationsList");
            listDiv.innerHTML = "";
            const data = snap.val();
            if(data) Object.keys(data).reverse().forEach(id => {
                const a = data[id];
                listDiv.innerHTML += `<div class="app-card"><b>Name:</b> ${a.name}<br><b>Phone:</b> ${a.phone}<br><b>Amount:</b> ₹${a.amount}</div>`;
            });
        });
    };

    window.openUserManager = () => { 
        document.getElementById('userModal').style.display = 'flex'; 
        window.switchTab('admin'); 
    };

    window.switchTab = (type) => {
        document.getElementById('tabAdmin').className = type === 'admin' ? 'tab-btn active' : 'tab-btn';
        document.getElementById('tabUser').className = type === 'user' ? 'tab-btn active' : 'tab-btn';
        
        const listDiv = document.getElementById('emailList');
        
        onValue(ref(db, 'users'), (snap) => {
            const users = snap.val() || {};
            listDiv.innerHTML = "";

            Object.keys(users).forEach(uid => {
                const u = users[uid];
                const isAdmin = u.role === 'admin' || u.email === SUPER_ADMIN;
                
                if((type === 'admin' && isAdmin) || (type === 'user' && !isAdmin)) {
                    listDiv.innerHTML += `
                    <div class="user-item">
                        <span>${u.email} ${u.email === SUPER_ADMIN ? '👑' : ''}</span>
                        ${u.email === SUPER_ADMIN ? '' : `
                            <button class="dots-btn" onclick="event.stopPropagation(); window.toggleDrop('${uid}')">⋮</button>
                            <div id="drop-${uid}" class="dropdown">
                                <button onclick="window.updateRole('${uid}', '${u.role === 'admin' ? 'user' : 'admin'}')">${u.role === 'admin' ? 'Demote to User' : 'Promote to Admin'}</button>
                                <button style="color:#ef4444;" onclick="window.deleteUser('${uid}')">Delete Account</button>
                            </div>
                        `}
                    </div>`;
                }
            });
        });
    };

    window.toggleDrop = (id) => {
        const d = document.getElementById('drop-' + id);
        const isOpen = d.style.display === 'block';
        document.querySelectorAll('.dropdown').forEach(el => el.style.display = 'none');
        if(!isOpen) d.style.display = 'block';
    };

    window.updateRole = (uid, role) => { 
        update(ref(db, `users/${uid}`), { role }); 
    };

    window.deleteUser = (uid) => { 
        if(confirm("Are you sure you want to delete this user?")) {
            remove(ref(db, `users/${uid}`)); 
        }
    };

    window.exportData = async () => {
        const snap = await get(ref(db, 'applications'));
        const blob = new Blob([JSON.stringify(snap.val(), null, 4)], { type: "application/json" });
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "backup.json"; a.click();
    };

    document.getElementById("loginSubmitBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value;
        const pass = document.getElementById("loginPass").value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            if(email === SUPER_ADMIN) { 
                localStorage.setItem("isAdmin", "true"); 
                location.reload(); 
            } else {
                document.getElementById("loginError").innerText = "Access Denied: Not Super Admin";
            }
        } catch (e) { document.getElementById("loginError").innerText = "Error: " + e.message; }
    };

    if (localStorage.getItem("isAdmin") === "true") {
        document.getElementById("authLockOverlay").style.display = "none";
        document.getElementById("adminContent").style.display = "block";
        onValue(ref(db, 'applications'), s => document.getElementById("statApps").innerText = s.exists() ? Object.keys(s.val()).length : 0);
        onValue(ref(db, 'users'), s => document.getElementById("statUsers").innerText = s.exists() ? Object.keys(s.val()).length : 0);
        onValue(ref(db, 'settings/maintenance'), s => {
            const m = s.val();
            document.getElementById("statMaintenance").innerText = m ? "Maintenance" : "Live";
            document.getElementById("statMaintenance").style.color = m ? "#ef4444" : "#22c55e";
            document.getElementById("maintToggleBtn").innerText = m ? "Disable Maintenance" : "Enable Maintenance";
        });
    }

    document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown').forEach(d => d.style.display = 'none');
    });
</script>

<script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let snowflakes = [];
    for(let i=0;i<80;i++){ snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white"; ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        for(let f of snowflakes){ f.y += f.d; if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; } }
    }
    setInterval(drawSnow, 30);
    window.onresize = resize;
</script>
</body>
</html>
