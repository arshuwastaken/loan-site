<!DOCTYPE html>
<html>
<head>
    <title>Star Choice - Admin Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        html { opacity: 0; animation: fadeInPage 0.8s ease-in forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; min-height: 100vh; overflow-x: hidden; }
        body::before { content: ""; position: fixed; inset: 0; background: url('bg.png') center/cover no-repeat; z-index: -2; opacity: 0.4; transition: 0.5s; }
        
        canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; position: relative; z-index: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; background: rgba(30, 41, 59, 0.7); padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* Settings Section */
        .settings-card { background: rgba(30, 41, 59, 0.9); padding: 25px; border-radius: 15px; margin-bottom: 30px; border: 1px solid #22c55e; text-align: center; }
        
        .upload-area { 
            border: 2px dashed rgba(34, 197, 94, 0.5); 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 15px; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .upload-area:hover { background: rgba(34, 197, 94, 0.1); border-color: #22c55e; }

        /* Custom Popup Modal */
        #customAlert { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            z-index: 9999; 
            justify-content: center; 
            align-items: center; 
        }
        .alert-box { 
            background: #1e293b; 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            border: 1px solid #22c55e; 
            width: 320px; 
            animation: popUp 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        @keyframes popUp { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .btn-main { 
            background: #22c55e; color: white; border: none; padding: 12px 20px; border-radius: 10px; 
            cursor: pointer; font-weight: 600; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; margin-top: 10px;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }

        .app-card { background: rgba(30, 41, 59, 0.8); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); position: relative; }
        .status-badge { position: absolute; top: 20px; right: 20px; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 600; background: #f1c40f; color: #000; }
        .detail { margin: 8px 0; font-size: 14px; color: #cbd5e1; }

        #accessDenied { display: none; text-align: center; padding-top: 150px; }
        #adminContent { display: none; }
    </style>
</head>
<body>

<canvas id="snow"></canvas>

<!-- Custom Popup Modal -->
<div id="customAlert">
    <div class="alert-box">
        <h3 id="alertTitle" style="margin-top:0;">Notification</h3>
        <p id="alertMsg"></p>
        <button class="btn-main" onclick="closeAlert()">Okay, Got it!</button>
    </div>
</div>

<div class="container">
    <div id="accessDenied">
        <h1>🚫 Access Denied</h1>
        <button class="btn-main" onclick="window.location.href='index.html'">Go Home</button>
    </div>

    <div id="adminContent">
        <div class="header">
            <h2 style="margin:0;">Admin Panel 🔐</h2>
            <button onclick="logout()" style="background:#ef4444; color:white; border:none; padding:8px 15px; border-radius:8px; cursor:pointer;">Sign Out</button>
        </div>

        <!-- Background Settings -->
        <div class="settings-card">
            <h3 style="margin:0;">Website Appearance 🖼️</h3>
            <p style="color: #94a3b8; font-size: 14px;">Upload background image from your computer:</p>
            
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <p id="fileName">Click to select image file</p>
                <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(this)">
            </div>
            
            <button class="btn-main" id="uploadBtn" onclick="uploadBG()" style="width: 100%; justify-content: center; margin-top: 20px;">
                🚀 Apply New Background
            </button>
        </div>

        <div style="display: flex; gap: 15px; margin-bottom: 25px;">
            <button class="btn-main" id="fetchBtn" onclick="loadApplications()" style="flex:1;">🔍 Sync Data</button>
            <a href="https://docs.google.com/spreadsheets/d/1UZs2_kd8iF0lBXaaSiRDJNoPlelvCgqbFSGyxw2E8nU/edit" target="_blank" class="btn-main" style="flex:1; background:#10a34a; text-decoration:none;">📂 Sheets</a>
        </div>

        <div id="applicationsList"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let selectedBase64 = "";

    // Login Check
    if (localStorage.getItem("isAdmin") === "true") {
        document.getElementById("adminContent").style.display = "block";
    } else {
        document.getElementById("accessDenied").style.display = "block";
    }

    // Handle File Selection
    window.handleFile = function(input) {
        const file = input.files[0];
        if (file) {
            if (file.size > 1000000) { // 1MB Limit for DB safety
                showAlert("File Too Large", "Bhai, image 1MB se choti rakho taaki site fast chale!", "#ef4444");
                input.value = "";
                return;
            }
            document.getElementById("fileName").innerText = "Selected: " + file.name;
            const reader = new FileReader();
            reader.onload = (e) => { selectedBase64 = e.target.result; };
            reader.readAsDataURL(file);
        }
    };

    // Upload to Firebase
    window.uploadBG = function() {
        if (!selectedBase64) {
            showAlert("No File", "Pehle koi image select toh kar lo bhai!", "#f1c40f");
            return;
        }

        const uploadBtn = document.getElementById("uploadBtn");
        uploadBtn.innerText = "⏳ Uploading...";
        uploadBtn.disabled = true;

        const bgRef = ref(db, 'settings/backgroundUrl');
        set(bgRef, selectedBase64).then(() => {
            showAlert("Success! 🎉", "Background change ho gaya! Ab sabhi pages par yahi dikhega.", "#22c55e");
            uploadBtn.innerText = "🚀 Apply New Background";
            uploadBtn.disabled = false;
        }).catch(err => {
            showAlert("Error", "Kuch gadbad ho gayi!", "#ef4444");
            uploadBtn.disabled = false;
        });
    };

    // Global Functions for UI
    window.showAlert = (title, msg, color) => {
        document.getElementById("alertTitle").innerText = title;
        document.getElementById("alertTitle").style.color = color;
        document.getElementById("alertMsg").innerText = msg;
        document.getElementById("customAlert").style.display = "flex";
    };

    window.closeAlert = () => { document.getElementById("customAlert").style.display = "none"; };
    
    window.logout = () => { localStorage.removeItem("isAdmin"); window.location.href="index.html"; };

    window.loadApplications = function() {
        onValue(ref(db, 'applications'), (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById("applicationsList");
            listDiv.innerHTML = "";
            if (!data) { listDiv.innerHTML = "<p style='text-align:center;'>No records.</p>"; return; }
            Object.keys(data).reverse().forEach(id => {
                const app = data[id];
                listDiv.innerHTML += `
                    <div class="app-card">
                        <span class="status-badge">${app.status || 'New'}</span>
                        <div class="detail"><b>👤 Name:</b> ${app.name}</div>
                        <div class="detail"><b>📞 Phone:</b> ${app.phone}</div>
                        <div class="detail"><b>💰 Amount:</b> ₹${app.amount}</div>
                    </div>`;
            });
        });
    };
</script>

<script>
    // Snow logic remains same...
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    let snowflakes = [];
    for(let i=0;i<80;i++){ snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*2+1, d: Math.random()*1 }); }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        for(let f of snowflakes){ f.y += f.d; if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; } }
    }
    setInterval(drawSnow, 30);
</script>
</body>
</html>
