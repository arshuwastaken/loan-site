<!DOCTYPE html>
<html>
<head>
    <title>Apply Loan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; font-family: Arial; color: white; background: #0f172a; text-align: center; }
        .box {
            background: #1e293b;
            padding: 25px;
            margin: 50px auto;
            width: 320px;
            border-radius: 12px;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 8px;
            border-radius: 6px;
            border: none;
        }
        button {
            padding: 12px 25px;
            background: #22c55e;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>Apply For Loan</h1>
<div class="box">
    <input type="text" placeholder="Full Name">
    <input type="number" placeholder="Loan Amount">
    <input type="text" placeholder="Mobile Number">
    <button onclick="apply()">Submit</button>
</div>
<script>
function apply(){ alert("Application submitted!"); }
</script>
</body>
</html>
