<!DOCTYPE html>
<html>
<head>
    <title>Apply For Loan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url('bg.png') center/cover no-repeat;
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.8s ease-in;
            overflow: hidden;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: -2;
        }

        canvas { position: fixed; inset: 0; z-index: -1; }

        .box {
            background: rgba(30, 41, 59, 0.4);
            padding: 30px;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        #messageBox {
            position: fixed;
            top: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            display: none;
            animation: fadeIn 0.5s;
            z-index: 1000;
        }

        h1 { margin-bottom: 20px; }
        input { width: 85%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; outline: none; }
        input::placeholder { color: rgba(255,255,255,0.6); }
        button { width: 90%; padding: 12px; margin-top: 15px; background: rgba(34, 197, 94, 0.8); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { transform: translateY(-3px); background: rgba(34, 197, 94, 1); }
        button:disabled { background: #4b5563; cursor: not-allowed; }
    </style>
</head>

<body>

<canvas id="snow"></canvas>
<div id="messageBox"></div>

<div class="box">
    <h1>Apply For Loan 💰</h1>
    <input type="text" id="name" placeholder="Full Name">
    <input type="number" id="amount" placeholder="Loan Amount">
    <input type="text" id="phone" placeholder="Mobile Number">
    <button id="submitBtn" onclick="apply()">Submit Application</button>
</div>

<!-- Firebase Logic -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAKBCIOqBUFjZWqPZ-5cTxNvD8XFqyhlKU",
        authDomain: "star-choice-finserv.firebaseapp.com",
        projectId: "star-choice-finserv",
        storageBucket: "star-choice-finserv.firebasestorage.app",
        messagingSenderId: "724236316044",
        appId: "1:724236316044:web:f20c2a4466d8c22d117aa9",
        databaseURL: "https://star-choice-finserv-default-rtdb.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.apply = async function() {
        var name = document.getElementById('name').value.trim();
        var amount = document.getElementById('amount').value.trim();
        var phone = document.getElementById('phone').value.trim();
        var btn = document.getElementById('submitBtn');

        if(!name || !amount || !phone) {
            showMsg("Please fill all fields!", "#ef4444");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Sending...";

        try {
            // 1. Firebase pe data bhejna (Admin Panel ke liye)
            const appRef = ref(db, 'applications');
            const newAppRef = push(appRef);
            await set(newAppRef, {
                name: name,
                amount: amount,
                phone: phone,
                status: "Pending",
                timestamp: Date.now()
            });

            // 2. Google Sheets pe data bhejna
            var sheetUrl = "https://script.google.com/macros/s/AKfycbx-2CS_gmfKjUdrcIJ8wnUSKIF5EUFuT95cH20fZpo5ikI4z0_42EGV9t3YIdy52aMJ/exec";
            
            fetch(sheetUrl + "?name=" + encodeURIComponent(name) + "&amount=" + amount + "&phone=" + phone, { mode: 'no-cors' })
            .then(() => {
                showMsg("Application submitted successfully!", "#22c55e");
                // Fields clear karna
                document.getElementById('name').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('phone').value = '';
                
                setTimeout(() => { window.location.href = "index.html"; }, 2000);
            })
            .catch(() => {
                showMsg("Sheet Error, but Dashboard updated!", "#f1c40f");
            });

        } catch (error) {
            showMsg("Error occurred. Try again.", "#ef4444");
            btn.disabled = false;
            btn.innerText = "Submit Application";
        }
    }
</script>

<script>
    function showMsg(text, color) {
        var msgBox = document.getElementById('messageBox');
        msgBox.innerText = text;
        msgBox.style.backgroundColor = color;
        msgBox.style.display = 'block';
        setTimeout(() => { msgBox.style.display = 'none'; }, 3000);
    }

    /* Snow Script */
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener("resize", resize);
    let snowflakes = [];
    for(let i=0;i<120;i++){
        snowflakes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*3+1, d: Math.random()*1.5 });
    }
    function drawSnow(){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "white";
        ctx.beginPath();
        for(let f of snowflakes){ ctx.moveTo(f.x,f.y); ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true); }
        ctx.fill();
        moveSnow();
    }
    function moveSnow(){
        for(let f of snowflakes){
            f.y += f.d;
            if(f.y > canvas.height){ f.y = 0; f.x = Math.random()*canvas.width; }
        }
    }
    setInterval(drawSnow, 25);
</script>

</body>
</html>
