<!DOCTYPE html>
<html>
<head>
    <title>Star Choice - Firebase Leads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="[https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap](https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap)" rel="stylesheet">

    <style>
        html { opacity: 0; animation: fadeInPage 0.8s ease-in forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('bg.png') center/cover no-repeat;
            z-index: -2;
            opacity: 0.4;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: rgba(30, 41, 59, 0.7);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-container {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 15px 12px 40px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .search-bar:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .date-picker {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .btn-main {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }
        .btn-blue { background: #3b82f6; }
        .btn-back { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); }

        /* Table UI */
        .leads-table-wrapper {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        .table-header-row {
            display: grid;
            grid-template-columns: 100px 110px 140px 140px 120px 1fr;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: #22c55e;
        }

        .lead-row-container { border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .lead-main-row {
            display: grid;
            grid-template-columns: 100px 110px 140px 140px 120px 1fr;
            padding: 16px 20px;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }

        .lead-details-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(15, 23, 42, 0.3); }
        .details-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; border-top: 1px dashed rgba(255, 255, 255, 0.1); }
        .detail-item b { color: #94a3b8; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .detail-item span { color: #e2e8f0; font-weight: 500; font-size: 13px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .custom-modal { background: rgba(30, 41, 59, 0.95); padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }

        .loader { text-align: center; padding: 50px; display: none; }
        .status-msg { text-align: center; color: #94a3b8; padding: 30px; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

<canvas id="snow"></canvas>

<div id="customModalOverlay" class="modal-overlay">
    <div class="custom-modal">
        <div id="modalIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
        <div id="modalMessage" style="margin-bottom:20px;">Message</div>
        <button class="btn-main btn-blue" onclick="closeModal()">OK</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <!-- Search Section -->
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-bar" placeholder="Search Lead ID or Name..." onkeyup="filterLeads()">
        </div>

        <div class="action-area">
            <input type="date" id="customDateInput" class="date-picker">
            <button class="btn-main btn-blue" onclick="fetchStarLeads(true)">📅 Fetch Date</button>
            <button class="btn-main" onclick="fetchStarLeads(false)">🔄 Today</button>
            <a href="admin.html" class="btn-main btn-back">⬅️ Back</a>
        </div>
    </div>

    <div id="loader" class="loader">
        <div style="font-size:40px; animation:spin 2s linear infinite;">⏳</div>
        <p>Fetching Star Firebase Data...</p>
    </div>

    <div class="leads-table-wrapper" id="tableWrapper" style="display: none;">
        <div class="table-header-row">
            <div>Lead ID</div>
            <div>Date</div>
            <div>Source</div>
            <div>Mob.</div>
            <div>City</div>
            <div>Customer Name</div>
        </div>
        <div id="leadsList"></div>
    </div>
    
    <div id="initialMsg" class="status-msg">Click 'Today' or choose a date to search.</div>
</div>

<script>
function showModal(msg, icon="⚠️") {
    document.getElementById("modalMessage").innerText = msg;
    document.getElementById("modalIcon").innerText = icon;
    document.getElementById("customModalOverlay").classList.add("active");
}
function closeModal() { document.getElementById("customModalOverlay").classList.remove("active"); }

function toggleRow(container) {
    const panel = container.querySelector('.lead-details-panel');
    const isActive = container.classList.contains('active');
    document.querySelectorAll('.lead-row-container').forEach(r => {
        r.classList.remove('active');
        r.querySelector('.lead-details-panel').style.maxHeight = null;
    });
    if (!isActive) {
        container.classList.add('active');
        panel.style.maxHeight = panel.scrollHeight + "px";
    }
}

function generateLeadID(key) {
    let hash = 0;
    for (let i = 0; i < key.length; i++) hash = key.charCodeAt(i) + ((hash << 5) - hash);
    return `ST-2026-${Math.abs(hash % 9000) + 1000}`;
}

// REAL-TIME FILTER LOGIC
function filterLeads() {
    const query = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll(".lead-row-container");
    
    rows.forEach(row => {
        const leadId = row.getAttribute("data-id").toLowerCase();
        const custName = row.getAttribute("data-name").toLowerCase();
        
        if (leadId.includes(query) || custName.includes(query)) {
            row.style.display = "";
        } else {
            row.style.display = "none";
        }
    });
}

async function fetchStarLeads(isCustomDate = false) {
    const leadsList = document.getElementById("leadsList");
    const loader = document.getElementById("loader");
    const tableWrapper = document.getElementById("tableWrapper");
    const initialMsg = document.getElementById("initialMsg");
    let targetDate = "";

    if (isCustomDate) {
        const dateInput = document.getElementById("customDateInput").value;
        if (!dateInput) { showModal("Select a date!"); return; }
        const [yyyy, mm, dd] = dateInput.split("-");
        targetDate = `${dd}/${mm}/${yyyy}`;
    } else {
        const now = new Date();
        targetDate = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
    }

    leadsList.innerHTML = "";
    initialMsg.style.display = "none";
    tableWrapper.style.display = "none";
    loader.style.display = "block";

    try {
        const response = await fetch(`[https://star-leads-backup-a7974-default-rtdb.asia-southeast1.firebasedatabase.app/star_leads.json?orderBy=](https://star-leads-backup-a7974-default-rtdb.asia-southeast1.firebasedatabase.app/star_leads.json?orderBy=)"12"&equalTo="${targetDate}"`);
        const data = await response.json();
        loader.style.display = "none";

        if (!data || Object.keys(data).length === 0) {
            initialMsg.style.display = "block";
            initialMsg.innerText = "No records found.";
            return;
        }

        tableWrapper.style.display = "block";
        Object.keys(data).reverse().forEach(key => {
            const row = data[key];
            if (Array.isArray(row)) {
                const rowContainer = document.createElement("div");
                rowContainer.className = "lead-row-container";
                const genId = generateLeadID(key);
                const cName = row[10] || 'N/A';
                
                // Store data for searching
                rowContainer.setAttribute("data-id", genId);
                rowContainer.setAttribute("data-name", cName);

                rowContainer.innerHTML = `
                    <div class="lead-main-row" onclick="toggleRow(this.parentElement)">
                        <div style="color: #3b82f6; font-weight:600;">${genId}</div>
                        <div>${row[12] || 'N/A'}</div>
                        <div>${row[2] || 'N/A'}</div>
                        <div>${row[5] || 'N/A'}</div>
                        <div>${row[3] || 'N/A'}</div>
                        <div style="font-weight:600;">${cName} <span style="font-size:10px; color:#64748b; margin-left:5px;">▼</span></div>
                    </div>
                    <div class="lead-details-panel">
                        <div class="details-grid">
                            <div class="detail-item"><b>Source</b><span>${row[11] || 'N/A'}</span></div>
                            <div class="detail-item"><b>Product</b><span>${row[13] || 'N/A'}</span></div>
                            <div class="detail-item"><b>Bank</b><span>${row[6] || 'N/A'}</span></div>
                            <div class="detail-item"><b>Vehicle</b><span>${row[7] || 'N/A'}</span></div>
                            <div class="detail-item"><b>RC No</b><span>${row[4] || 'N/A'}</span></div>
                            <div class="detail-item"><b>Amount</b><span>₹${row[8] || '0.00'} L</span></div>
                            <div class="detail-item"><b>Rem</b><span>${row[9] || 'N/A'}</span></div>
                            <div class="detail-item"><b>Banker</b><span>${row[14] || 'N/A'}</span></div>
                        </div>
                    </div>
                `;
                leadsList.appendChild(rowContainer);
            }
        });
    } catch(e) { loader.style.display = "none"; showModal("Error: " + e.message); }
}

const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
let snowflakes = [];
for(let i=0; i<80; i++) snowflakes.push({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, d:Math.random()*1 });
function drawSnow() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "white"; ctx.beginPath();
    for(let f of snowflakes) { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI*2, true); }
    ctx.fill();
    for(let f of snowflakes) { f.y += f.d; if(f.y > canvas.height) { f.y=0; f.x=Math.random()*canvas.width; } }
}
setInterval(drawSnow, 30);
window.onresize = resize;
</script>

</body>
</html>
