<!DOCTYPE html>
<html>
<head>
    <title>Star Choice - Firebase Leads</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        html { opacity: 0; animation: fadeInPage 0.8s ease-in forwards; }
        @keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: url('bg.png') center/cover no-repeat;
            z-index: -2;
            opacity: 0.4;
        }

        canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: rgba(30, 41, 59, 0.7);
            padding: 25px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 20px;
        }

        .search-container {
            margin-bottom: 25px;
            display: none;
        }

        .search-bar {
            width: 100%;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            box-sizing: border-box;
        }

        .search-bar:focus {
            border-color: #22c55e;
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .action-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .date-picker {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 14px;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .btn-main {
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34, 197, 94, 0.4); }
        .btn-blue { background: #3b82f6; }
        .btn-back { background: rgba(255,255,255,0.15); backdrop-filter: blur(5px); }

        .leads-table-wrapper {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            backdrop-filter: blur(15px);
            overflow: hidden;
        }

        /* 6 columns: Lead ID | Date | Source By Star | Mob. | City | Customer Name */
        .table-header-row {
            display: grid;
            grid-template-columns: 90px 110px 160px 140px 140px 1fr;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
            color: #22c55e;
            letter-spacing: 0.5px;
        }

        .lead-row-container {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }

        .lead-main-row {
            display: grid;
            grid-template-columns: 90px 110px 160px 140px 140px 1fr;
            padding: 16px 20px;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }

        .lead-main-row:hover {
            background: rgba(255,255,255,0.03);
        }

        .customer-name { font-weight: 600; color: #f8fafc; display: flex; align-items: center; justify-content: space-between; }
        .expand-icon { color: #64748b; transition: transform 0.3s; font-size: 12px; }
        .lead-row-container.active .expand-icon { transform: rotate(180deg); color: #22c55e; }

        .lead-details-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease-out;
            background: rgba(15, 23, 42, 0.3);
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .detail-item b { color: #94a3b8; font-size: 11px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .detail-item span { color: #e2e8f0; font-weight: 500; }

        .loader { text-align: center; padding: 50px; display: none; }
        .status-msg { text-align: center; color: #94a3b8; padding: 30px; font-size: 14px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 999; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .custom-modal { background: rgba(30, 41, 59, 0.95); border: 1px solid rgba(255, 255, 255, 0.15); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .btn-modal-close { background: #3b82f6; color: white; border: none; padding: 10px 30px; border-radius: 10px; cursor: pointer; font-weight: 600; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>

<body>

<canvas id="snow"></canvas>

<div id="customModalOverlay" class="modal-overlay">
    <div class="custom-modal">
        <div id="modalIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
        <div id="modalMessage" style="font-size:15px; color:#e2e8f0; margin-bottom:25px; word-break: break-all;">Please select a valid date first!</div>
        <button class="btn-modal-close" onclick="closeModal()">OK</button>
    </div>
</div>

<div class="container">
    <div class="header">
        <div>
            <h2 style="margin:0; font-size:24px; letter-spacing:-0.5px;">Star Leads Database 🚀</h2>
            <p style="margin:5px 0 0; font-size:13px; color:#94a3b8; opacity:0.8;">Fetching real-time data from Star Firebase</p>
        </div>

        <div class="action-area">
            <input type="date" id="customDateInput" class="date-picker">
            <button class="btn-main btn-blue" onclick="fetchStarLeads(true)">📅 Fetch Date wise</button>
            <button class="btn-main" onclick="fetchStarLeads(false)">🔄 Refresh Today</button>
            <a href="admin.html" class="btn-main btn-back">⬅️ Back</a>
        </div>
    </div>

    <div class="search-container" id="searchBox">
        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search by Lead ID or Customer Name..." onkeyup="filterLeads()">
    </div>

    <div id="loader" class="loader">
        <div style="font-size:40px; animation:spin 2s linear infinite;">⏳</div>
        <p style="margin-top:15px; color:#94a3b8;">Connecting to Star Firebase...</p>
    </div>

    <div class="leads-table-wrapper" id="tableWrapper" style="display: none;">
        <div class="table-header-row">
            <div>Lead ID</div>
            <div>Date</div>
            <div>Source By Star</div>
            <div>Mob.</div>
            <div>City</div>
            <div>Customer Name</div>
        </div>
        <div id="leadsList"></div>
    </div>

    <div id="initialMsg" class="status-msg">Click 'Refresh Today' or choose a custom date to load entries.</div>
</div>

<script>
function showModal(message, icon = "⚠️") {
    document.getElementById("modalMessage").innerText = message;
    document.getElementById("modalIcon").innerText = icon;
    document.getElementById("customModalOverlay").classList.add("active");
}

function closeModal() { document.getElementById("customModalOverlay").classList.remove("active"); }

function toggleRow(container) {
    const panel = container.querySelector('.lead-details-panel');
    const isActive = container.classList.contains('active');
    document.querySelectorAll('.lead-row-container').forEach(row => {
        row.classList.remove('active');
        row.querySelector('.lead-details-panel').style.maxHeight = null;
    });
    if (!isActive) {
        container.classList.add('active');
        panel.style.maxHeight = panel.scrollHeight + "px";
    }
}

function filterLeads() {
    const input = document.getElementById('searchInput').value.toLowerCase();
    const rows = document.querySelectorAll('.lead-row-container');
    rows.forEach(row => {
        const leadID = row.getAttribute('data-id').toLowerCase();
        const customerName = row.getAttribute('data-name').toLowerCase();
        row.style.display = (leadID.includes(input) || customerName.includes(input)) ? "" : "none";
    });
}

// Generate a numeric-only Lead ID from the Firebase key
function generateLeadID(key) {
    let hash = 0;
    for (let i = 0; i < key.length; i++) {
        hash = key.charCodeAt(i) + ((hash << 5) - hash);
    }
    return String(Math.abs(hash % 90000) + 10000); // 5-digit numeric ID
}

async function fetchStarLeads(isCustomDate = false) {
    const leadsList = document.getElementById("leadsList");
    const loader = document.getElementById("loader");
    const tableWrapper = document.getElementById("tableWrapper");
    const initialMsg = document.getElementById("initialMsg");
    const searchBox = document.getElementById("searchBox");
    let targetDate = "";

    if (isCustomDate) {
        const dateInput = document.getElementById("customDateInput").value;
        if (!dateInput) { showModal("Please select a valid date first!"); return; }
        const [yyyy, mm, dd] = dateInput.split("-");
        targetDate = `${dd}/${mm}/${yyyy}`;
    } else {
        const now = new Date();
        const dd = String(now.getDate()).padStart(2, '0');
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const yyyy = now.getFullYear();
        targetDate = `${dd}/${mm}/${yyyy}`;
    }

    leadsList.innerHTML = "";
    initialMsg.style.display = "none";
    tableWrapper.style.display = "none";
    searchBox.style.display = "none";
    loader.style.display = "block";

    const firebaseUrl = `https://star-leads-backup-a7974-default-rtdb.asia-southeast1.firebasedatabase.app/star_leads.json?orderBy="12"&equalTo="${targetDate}"`;

    try {
        const response = await fetch(firebaseUrl);

        const contentType = response.headers.get("content-type");
        if (!contentType || !contentType.includes("application/json")) {
            const rawText = await response.text();
            throw new Error(`Expected JSON but received HTML/Text. Server says: ${rawText.substring(0, 100)}...`);
        }

        const data = await response.json();
        loader.style.display = "none";

        if (!data || Object.keys(data).length === 0) {
            initialMsg.style.display = "block";
            initialMsg.innerHTML = `ℹ️ No records found for ${targetDate}.`;
            showModal(`No data records available for ${targetDate}.`, "ℹ️");
            return;
        }

        tableWrapper.style.display = "block";
        searchBox.style.display = "block";

        Object.keys(data).reverse().forEach(key => {
            const row = data[key];
            if (!Array.isArray(row)) return;

            /*
             * Confirmed index mapping from live data:
             * row[0]  = (unused / index 0)
             * row[1]  = (unused / index 1)
             * row[2]  = Source By Star  (e.g. "MP")
             * row[3]  = City            (e.g. "NASRULLAGANJ")
             * row[4]  = Banker Name     (e.g. "ARVIND SHARMA")
             * row[5]  = Mobile          (e.g. "7049090759")
             * row[6]  = Car Details     (e.g. "BT Topup")
             * row[7]  = Calling Bank    (e.g. "IDFC Bank")
             * row[8]  = Loan Amount     (e.g. "45240 SWIFT VXI")
             * row[9]  = Remarks         (e.g. "MP04ZQ7684")
             * row[10] = Customer Name   (e.g. "N/A")
             * row[11] = Source          (e.g. "call back")
             * row[12] = Date            (e.g. "23/05/2026")
             * row[13] = Product         (e.g. "N/A")
             * row[14] = RC No.          (e.g. "N/A")
             */

            const generatedId = generateLeadID(key);
            const custName    = row[10] || 'N/A';
            const date        = row[12] || 'N/A';
            const sourceByStr = row[2]  || 'N/A';
            const mobile      = row[5]  || 'N/A';
            const city        = row[3]  || 'N/A';
            const source      = row[11] || 'N/A';
            const carDetails  = row[6]  || 'N/A';
            const callingBank = row[7]  || 'N/A';
            const loanAmt     = row[8]  || '0.00';
            const remarks     = row[9]  || 'N/A';
            const bankerName  = row[4]  || 'N/A';
            const product     = row[13] || 'N/A';
            const rcNo        = row[14] || 'N/A';

            const rowContainer = document.createElement("div");
            rowContainer.className = "lead-row-container";
            rowContainer.setAttribute('data-id', generatedId);
            rowContainer.setAttribute('data-name', custName);

            rowContainer.innerHTML = `
                <div class="lead-main-row" onclick="toggleRow(this.parentElement)">
                    <div style="color: #3b82f6; font-weight:600;">${generatedId}</div>
                    <div>${date}</div>
                    <div>${sourceByStr}</div>
                    <div>${mobile}</div>
                    <div>${city}</div>
                    <div class="customer-name">${custName} <span class="expand-icon">▼</span></div>
                </div>
                <div class="lead-details-panel">
                    <div class="details-grid">
                        <div class="detail-item"><b>Lead ID</b><span>${generatedId}</span></div>
                        <div class="detail-item"><b>Date</b><span>${date}</span></div>
                        <div class="detail-item"><b>Source</b><span>${source}</span></div>
                        <div class="detail-item"><b>Source By Star</b><span>${sourceByStr}</span></div>
                        <div class="detail-item"><b>City</b><span>${city}</span></div>
                        <div class="detail-item"><b>Customer Name</b><span>${custName}</span></div>
                        <div class="detail-item"><b>Mob.</b><span>${mobile}</span></div>
                        <div class="detail-item"><b>Product</b><span>${product}</span></div>
                        <div class="detail-item"><b>Calling Bank</b><span>${callingBank}</span></div>
                        <div class="detail-item"><b>Car Details</b><span>${carDetails}</span></div>
                        <div class="detail-item"><b>RC No.</b><span>${rcNo}</span></div>
                        <div class="detail-item"><b>Loan AMT</b><span>₹${loanAmt} L</span></div>
                        <div class="detail-item"><b>Remarks</b><span>${remarks}</span></div>
                        <div class="detail-item"><b>Banker Name</b><span>${bankerName}</span></div>
                    </div>
                </div>
            `;
            leadsList.appendChild(rowContainer);
        });

    } catch(error) {
        loader.style.display = "none";
        initialMsg.style.display = "block";
        initialMsg.innerHTML = `<div style="color:#ef4444;">❌ Database Error: ${error.message}</div>`;
        showModal(error.message, "❌");
    }
}

// Snow Effect
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
let snowflakes = [];
for (let i = 0; i < 80; i++) {
    snowflakes.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: Math.random() * 2 + 1, d: Math.random() * 1 });
}
function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "white";
    ctx.beginPath();
    for (let f of snowflakes) { ctx.moveTo(f.x, f.y); ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2, true); }
    ctx.fill();
    for (let f of snowflakes) { f.y += f.d; if (f.y > canvas.height) { f.y = 0; f.x = Math.random() * canvas.width; } }
}
setInterval(drawSnow, 30);
window.onresize = resize;
</script>

</body>
</html>
